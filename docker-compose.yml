services:
  mioku:
    build: .
    container_name: mioku
    restart: unless-stopped
    stdin_open: true
    tty: true
    ports:
      - "3339:3339"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./app.ts:/app/app.ts
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
      - ./install-mioku.sh:/app/install-mioku.sh
      - ./src:/app/src
      - ./plugins:/app/plugins
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./temp:/app/temp
      - mioku_node_modules:/app/node_modules
      - mioku_bun_cache:/root/.bun/install/cache

volumes:
  mioku_node_modules:
  mioku_bun_cache:
